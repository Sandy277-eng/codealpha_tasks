plugins {
    id 'java'
    id 'application'
}

repositories {
    mavenCentral()
}

dependencies {
    // JUnit 4 for testing
    testImplementation 'junit:junit:4.13.2'
}

mainClassName = 'com.demo.App'

test {
    testLogging {
        events "passed", "skipped", "failed"
    }
}

jar {
    manifest {
        attributes 'Main-Class': 'com.demo.App'
    }
    archiveBaseName = 'java-gradle-demo'
archiveVersion = '1.0.0'
}
